<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nour</title>
  <meta name="description" content="Welcome to Nour's website. The official website is coming soon." />
  <style>
    :root { --bg:#0f1020; --bg2:#1a1030; --fg:#f5f3ff; --muted:#b9b4d4; --accent:#c9a24b; }
    * { box-sizing: border-box; }
    html, body { height:100%; margin:0; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--fg);
      background:radial-gradient(1200px 800px at 50% -10%, var(--bg2), var(--bg));
      display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem;
    }
    .wrap { max-width:680px; }
    .mark {
      font-size:clamp(2.6rem,10vw,5rem); font-weight:700; letter-spacing:0.02em; margin:0 0 1rem;
      background:linear-gradient(90deg,var(--fg),var(--accent));
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    }
    .tag { font-size:clamp(1.05rem,3.5vw,1.4rem); color:var(--muted); margin:0 0 2rem; font-weight:400; line-height:1.5; }
    .soon {
      display:inline-block; border:1px solid rgba(201,162,75,0.5); color:var(--accent);
      border-radius:999px; padding:0.5rem 1.25rem; font-size:0.85rem; letter-spacing:0.15em; text-transform:uppercase;
    }
    footer { position:fixed; bottom:1.25rem; left:0; right:0; text-align:center; color:var(--muted); font-size:0.8rem; opacity:0.7; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="mark">Welcome to Nour's Website for teaching Arabic in Utrecht </h1>
    <p class="tag">The official website is coming soon…</p>
    <span class="soon">Coming Soon</span>
  </main>
  <footer>&copy; <span id="y"></span> shoukear.com</footer>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
